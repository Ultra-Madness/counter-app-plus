<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<meta name="theme-color" content="#0b0e1a" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<title>Counter App Plus</title>
<link rel="manifest" href="manifest.webmanifest" />
<link rel="icon" href="favicon-32.png" sizes="32x32" />
<link rel="apple-touch-icon" href="apple-touch-icon.png" />
<meta name="apple-mobile-web-app-title" content="Counter+" />
<meta name="mobile-web-app-capable" content="yes" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
<style>
  :root{
    --bg:#0b0e1a;
    --surface:#151a2e;
    --surface-2:#1c2340;
    --surface-3:#242c4c;
    --card-grad:linear-gradient(160deg,#171d34,#11162a);
    --border:#272e50;
    --border-2:#333c66;
    --ink:#f3f5fc;
    --text:#c6cae0;
    --muted:#8b90b5;
    --faint:#606690;
    --accent:#7c6cf0;
    --grad:linear-gradient(135deg,#6366f1,#8b5cf6);
    --ring-fill:#8b5cf6;
    --ring-track:#282f52;
    --success:#34d399;
    --danger:#fb7185;
    --white:#fff;
    --shadow:0 14px 34px rgba(4,6,16,.55);
    --glow:0 10px 26px rgba(109,94,240,.35);
    --ring-focus:0 0 0 3px rgba(124,108,240,.35);
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0; padding:0;}
  body{
    background:
      radial-gradient(900px 520px at 12% -10%, rgba(99,102,241,.16), transparent 60%),
      radial-gradient(760px 480px at 100% -5%, rgba(139,92,246,.13), transparent 55%),
      var(--bg);
    background-attachment:fixed;
    color:var(--text);
    font-family:"Inter",-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    -webkit-font-smoothing:antialiased; text-rendering:optimizeLegibility;
    min-height:100vh;
  }
  .wrap{max-width:480px; margin:0 auto; padding:22px 16px 96px;}

  header{display:flex; justify-content:space-between; align-items:center; padding:6px 2px 22px; gap:12px;}
  .brand{display:flex; align-items:center; gap:12px; min-width:0;}
  .logo{width:40px; height:40px; border-radius:12px; background:var(--grad); display:grid; place-items:center; color:#fff; box-shadow:var(--glow); flex:0 0 auto;}
  .logo svg{display:block;}
  .app-title{font-size:19px; font-weight:800; color:var(--ink); letter-spacing:-.02em; margin:0; line-height:1.1;}
  .app-sub{color:var(--muted); font-size:12.5px; margin-top:2px;}
  .add-btn{
    display:inline-flex; align-items:center; gap:6px;
    background:var(--grad); color:#fff; border:none;
    font-size:14px; font-weight:700; padding:10px 15px; border-radius:11px; cursor:pointer;
    box-shadow:var(--glow); transition:transform .06s ease, filter .15s ease; flex:0 0 auto;
  }
  .add-btn:hover{filter:brightness(1.06);}
  .add-btn:active{transform:translateY(1px);}
  .add-btn svg{display:block;}

  .empty{text-align:center; padding:70px 24px 40px; color:var(--muted);}
  .empty h2{color:var(--ink); font-size:17px; font-weight:700; margin:0 0 8px;}
  .empty p{font-size:14px; line-height:1.6; margin:0 auto; max-width:300px;}

  .card{
    background:var(--card-grad); border:1px solid var(--border); border-radius:20px;
    padding:18px; margin-bottom:16px; box-shadow:var(--shadow);
    transition:border-color .18s ease;
  }
  .card:hover{border-color:var(--border-2);}
  .card-head{display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;}
  .card-name{font-size:16px; font-weight:700; color:var(--ink); letter-spacing:-.01em; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; margin-right:8px;}
  .icon-btn{display:grid; place-items:center; width:32px; height:32px; border-radius:9px; background:var(--surface-2); border:1px solid var(--border); color:var(--muted); cursor:pointer; flex:0 0 auto; transition:color .15s ease, border-color .15s ease;}
  .icon-btn:hover{color:var(--ink); border-color:var(--border-2);}
  .icon-btn svg{display:block;}

  .hero{display:flex; align-items:center; gap:16px;}
  .ring{
    position:relative; width:104px; height:104px; border-radius:50%; flex:0 0 auto;
    background:conic-gradient(var(--ring-fill) calc(var(--pct) * 1%), var(--ring-track) 0);
    display:grid; place-items:center;
    filter:drop-shadow(0 6px 16px rgba(139,92,246,.28));
  }
  .ring.reached{background:conic-gradient(var(--success) calc(var(--pct) * 1%), var(--ring-track) 0); filter:drop-shadow(0 6px 16px rgba(52,211,153,.28));}
  .ring::after{content:""; position:absolute; inset:9px; border-radius:50%; background:#141a2d;}
  .ring-inner{position:relative; z-index:1; text-align:center;}
  .count{font-size:32px; font-weight:800; color:var(--ink); letter-spacing:-.03em; line-height:1; font-variant-numeric:tabular-nums;}
  .count.reached{color:var(--success);}
  .ring-sub{font-size:10px; font-weight:600; color:var(--muted); margin-top:3px; letter-spacing:.08em;}

  .controls{flex:1; display:flex; flex-direction:column; gap:10px; min-width:0;}
  .step{
    display:flex; align-items:center; justify-content:center; gap:8px;
    padding:14px 0; border-radius:13px; border:1px solid transparent; cursor:pointer;
    font-size:17px; font-weight:700; font-variant-numeric:tabular-nums; font-family:inherit;
    transition:transform .06s ease, filter .15s ease, background .15s ease;
  }
  .step svg{display:block;}
  .step:active{transform:translateY(1px);}
  .plus{background:var(--grad); color:#fff; box-shadow:var(--glow);}
  .plus:hover{filter:brightness(1.06);}
  .minus{background:var(--surface-2); color:var(--text); border-color:var(--border-2);}
  .minus:hover{background:var(--surface-3);}

  .goal-line{margin-top:14px; text-align:center; font-size:12.5px; color:var(--muted); font-variant-numeric:tabular-nums; letter-spacing:.01em;}
  .goal-line.reached{color:var(--success); font-weight:600;}

  .foot-row{display:flex; justify-content:space-between; align-items:center; margin-top:16px; padding-top:14px; border-top:1px solid var(--border);}
  .link{display:inline-flex; align-items:center; gap:6px; background:none; border:none; color:var(--muted); font-size:13.5px; font-weight:600; font-family:inherit; cursor:pointer; padding:4px 6px; border-radius:8px; transition:color .15s ease, background .15s ease;}
  .link svg{display:block;}
  .link:hover{color:var(--ink); background:var(--surface-2);}
  .link.danger{color:var(--danger);}
  .link.danger:hover{color:#fda4af; background:rgba(251,113,133,.08);}

  .backdrop{position:fixed; inset:0; background:rgba(5,7,16,.66); backdrop-filter:blur(3px); display:none; align-items:flex-end; justify-content:center; z-index:20;}
  .backdrop.open{display:flex;}
  .sheet{
    background:var(--surface); width:100%; max-width:480px; border:1px solid var(--border); border-bottom:none;
    border-top-left-radius:22px; border-top-right-radius:22px;
    padding:24px 22px 34px; max-height:88vh; overflow:auto;
    box-shadow:0 -20px 60px rgba(0,0,0,.5); animation:slideUp .22s cubic-bezier(.2,.7,.2,1);
  }
  @keyframes slideUp{from{transform:translateY(100%);} to{transform:translateY(0);}}
  @media (min-width:560px){
    .backdrop{align-items:center;}
    .sheet{border:1px solid var(--border); border-radius:20px; box-shadow:0 30px 80px rgba(0,0,0,.6);}
  }
  .sheet h2{font-size:19px; font-weight:800; color:var(--ink); letter-spacing:-.01em; margin:0 0 6px;}
  label{display:block; color:var(--muted); font-size:12px; font-weight:600; margin:15px 0 6px; letter-spacing:.02em;}
  input{
    width:100%; background:var(--surface-2); border:1px solid var(--border-2); border-radius:12px;
    padding:12px 14px; color:var(--ink); font-size:15px; font-family:inherit;
    transition:border-color .15s ease, box-shadow .15s ease;
  }
  input::placeholder{color:var(--faint);}
  input:focus{outline:none; border-color:var(--accent); box-shadow:var(--ring-focus);}
  .primary-btn{
    width:100%; background:var(--grad); color:#fff; border:none;
    padding:15px; border-radius:13px; font-size:16px; font-weight:700; cursor:pointer; margin-top:22px;
    box-shadow:var(--glow); transition:transform .06s ease, filter .15s ease;
  }
  .primary-btn:hover{filter:brightness(1.06);}
  .primary-btn:active{transform:translateY(1px);}
  .secondary-btn{background:var(--surface-2); color:var(--text); border:1px solid var(--border-2); box-shadow:none;}
  .secondary-btn:hover{background:var(--surface-3); filter:none;}
  .text-btn{width:100%; background:none; border:none; color:var(--muted); font-size:14px; font-weight:600; padding:12px; cursor:pointer; margin-top:8px; border-radius:9px; font-family:inherit; transition:color .15s ease, background .15s ease;}
  .text-btn:hover{color:var(--ink); background:var(--surface-2);}
  .text-btn.danger{color:var(--danger);}
  .text-btn.danger:hover{color:#fda4af; background:rgba(251,113,133,.08);}

  .summary-row{display:flex; gap:10px; margin-bottom:18px;}
  .summary-box{flex:1; background:var(--surface-2); border:1px solid var(--border); border-radius:13px; padding:14px 8px; text-align:center;}
  .summary-val{font-size:21px; font-weight:800; color:var(--ink); font-variant-numeric:tabular-nums;}
  .summary-lbl{color:var(--muted); font-size:11.5px; margin-top:4px;}
  .log-row{display:flex; justify-content:space-between; align-items:center; padding:13px 0; border-bottom:1px solid var(--border);}
  .log-val{font-size:15px; font-weight:600; color:var(--ink); font-variant-numeric:tabular-nums;}
  .log-date{color:var(--muted); font-size:13px;}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="brand">
      <div class="logo"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.6" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg></div>
      <div>
        <h1 class="app-title">Counter App Plus</h1>
        <div class="app-sub" id="subtitle">Track reps, inventory, attendance, habits</div>
      </div>
    </div>
    <button class="add-btn" id="addBtn"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.6" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg>New</button>
  </header>
  <div id="list"></div>
</div>

<!-- Add / Edit modal -->
<div class="backdrop" id="formBackdrop">
  <div class="sheet">
    <h2 id="formTitle">New counter</h2>
    <label for="fName">Name</label>
    <input id="fName" type="text" placeholder="e.g. Pushups, Boxes, Guests" />
    <label for="fStep">Step size (how much +/- changes)</label>
    <input id="fStep" type="number" inputmode="numeric" placeholder="1" />
    <label for="fGoal">Goal (optional)</label>
    <input id="fGoal" type="number" inputmode="numeric" placeholder="Leave blank for no goal" />
    <button class="primary-btn" id="saveBtn">Add counter</button>
    <button class="text-btn" id="cancelBtn">Cancel</button>
    <button class="text-btn danger" id="deleteBtn" style="display:none;">Delete this counter</button>
  </div>
</div>

<!-- History modal -->
<div class="backdrop" id="histBackdrop">
  <div class="sheet">
    <h2 id="histTitle">History</h2>
    <div class="summary-row">
      <div class="summary-box"><div class="summary-val" id="hCurrent">0</div><div class="summary-lbl">Current</div></div>
      <div class="summary-box"><div class="summary-val" id="hAllTime">0</div><div class="summary-lbl">All-time total</div></div>
      <div class="summary-box"><div class="summary-val" id="hResets">0</div><div class="summary-lbl">Resets</div></div>
    </div>
    <div id="histList"></div>
    <button class="primary-btn secondary-btn" id="histClose">Close</button>
  </div>
</div>

<script>
(function(){
  "use strict";
  var STORAGE_KEY = "counter_app_plus_web_v1";
  var counters = [];
  var editingId = null;   // null while adding
  var historyId = null;

  var IC = {
    plus:'<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.6" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg>',
    minus:'<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.6" stroke-linecap="round"><path d="M5 12h14"/></svg>',
    edit:'<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.12 2.12 0 0 1 3 3L7 19l-4 1 1-4Z"/></svg>',
    hist:'<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/></svg>',
    reset:'<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 1 0 2.6-6.4L3 8"/><path d="M3 3v5h5"/></svg>'
  };

  function makeId(){ return Date.now().toString(36) + Math.random().toString(36).slice(2,8); }

  function load(){
    try{
      var raw = localStorage.getItem(STORAGE_KEY);
      counters = raw ? JSON.parse(raw) : [];
      if(!Array.isArray(counters)) counters = [];
    }catch(e){ counters = []; }
  }
  function save(){
    try{ localStorage.setItem(STORAGE_KEY, JSON.stringify(counters)); }catch(e){}
  }
  function find(id){ return counters.filter(function(c){return c.id===id;})[0]; }

  function esc(s){
    return String(s).replace(/[&<>"']/g, function(m){
      return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m];
    });
  }
  function fmtDate(ms){
    var d = new Date(ms);
    return d.toLocaleString(undefined,{month:'short',day:'numeric',hour:'numeric',minute:'2-digit'});
  }

  // ---- Render list ----
  function render(){
    var sub = document.getElementById('subtitle');
    sub.textContent = counters.length===0
      ? 'Track reps, inventory, attendance, habits'
      : counters.length + ' counter' + (counters.length===1?'':'s');

    var list = document.getElementById('list');
    if(counters.length===0){
      list.innerHTML =
        '<div class="empty"><h2>No counters yet</h2>' +
        '<p>Tap &ldquo;New&rdquo; to create your first counter. Give it a name, choose a step size, and optionally set a goal.</p></div>';
      return;
    }
    list.innerHTML = counters.map(function(c){
      var hasGoal = c.goal!==null && c.goal>0;
      var reached = hasGoal && c.count>=c.goal;
      var pct = hasGoal ? Math.min(c.count/c.goal,1)*100 : 0;
      var rc = reached ? ' reached' : '';
      var ringSub = hasGoal ? '<div class="ring-sub">'+Math.round(pct)+'%</div>' : '';
      var goalLine = hasGoal
        ? '<div class="goal-line'+rc+'">'+(reached ? ('Goal reached &middot; '+c.goal) : (c.count+' / '+c.goal+' goal'))+'</div>'
        : '';
      return '<div class="card">' +
        '<div class="card-head"><div class="card-name">'+esc(c.name)+'</div>' +
        '<button class="icon-btn" data-act="edit" data-id="'+c.id+'" aria-label="Edit">'+IC.edit+'</button></div>' +
        '<div class="hero">' +
          '<div class="ring'+rc+'" style="--pct:'+pct+'">' +
            '<div class="ring-inner"><div class="count'+rc+'">'+c.count+'</div>'+ringSub+'</div>' +
          '</div>' +
          '<div class="controls">' +
            '<button class="step plus" data-act="inc" data-id="'+c.id+'">'+IC.plus+'<span>'+c.step+'</span></button>' +
            '<button class="step minus" data-act="dec" data-id="'+c.id+'">'+IC.minus+'<span>'+c.step+'</span></button>' +
          '</div>' +
        '</div>' +
        goalLine +
        '<div class="foot-row">' +
          '<button class="link" data-act="hist" data-id="'+c.id+'">'+IC.hist+'<span>History ('+c.history.length+')</span></button>' +
          '<button class="link danger" data-act="reset" data-id="'+c.id+'">'+IC.reset+'<span>Reset</span></button>' +
        '</div></div>';
    }).join('');
  }

  // ---- Actions ----
  function inc(id){ var c=find(id); if(c){ c.count+=c.step; save(); render(); } }
  function dec(id){ var c=find(id); if(c){ c.count=Math.max(0,c.count-c.step); save(); render(); } }
  function reset(id){
    var c=find(id); if(!c) return;
    if(!confirm('Reset "'+c.name+'" back to 0? The value it reached ('+c.count+') will be saved in its history.')) return;
    if(c.count>0){ c.history.push({id:makeId(), previousCount:c.count, at:Date.now()}); }
    c.count=0; save(); render();
  }

  // ---- Add/Edit modal ----
  function openForm(id){
    editingId = id || null;
    var c = id ? find(id) : null;
    document.getElementById('formTitle').textContent = c ? 'Edit counter' : 'New counter';
    document.getElementById('saveBtn').textContent = c ? 'Save changes' : 'Add counter';
    document.getElementById('fName').value = c ? c.name : '';
    document.getElementById('fStep').value = c ? c.step : '1';
    document.getElementById('fGoal').value = (c && c.goal!==null) ? c.goal : '';
    document.getElementById('deleteBtn').style.display = c ? 'block' : 'none';
    document.getElementById('formBackdrop').classList.add('open');
  }
  function closeForm(){ document.getElementById('formBackdrop').classList.remove('open'); editingId=null; }
  function saveForm(){
    var name = document.getElementById('fName').value.trim() || 'Untitled';
    var step = parseInt(document.getElementById('fStep').value,10);
    if(!(step>0)) step = 1;
    var goalRaw = document.getElementById('fGoal').value.trim();
    var goal = goalRaw==='' ? null : parseInt(goalRaw,10);
    if(!(goal>0)) goal = null;
    if(editingId){
      var c=find(editingId); if(c){ c.name=name; c.step=step; c.goal=goal; }
    }else{
      counters.push({id:makeId(), name:name, count:0, step:step, goal:goal, history:[], createdAt:Date.now()});
    }
    save(); render(); closeForm();
  }
  function deleteCurrent(){
    if(!editingId) return;
    var c=find(editingId); if(!c) return;
    if(!confirm('Delete "'+c.name+'" and its history? This cannot be undone.')) return;
    counters = counters.filter(function(x){return x.id!==editingId;});
    save(); render(); closeForm();
  }

  // ---- History modal ----
  function openHist(id){
    historyId = id;
    var c = find(id); if(!c) return;
    var resetTotal = c.history.reduce(function(s,h){return s+(h.previousCount||0);},0);
    document.getElementById('histTitle').textContent = c.name + ' — History';
    document.getElementById('hCurrent').textContent = c.count;
    document.getElementById('hAllTime').textContent = resetTotal + c.count;
    document.getElementById('hResets').textContent = c.history.length;
    var listEl = document.getElementById('histList');
    if(c.history.length===0){
      listEl.innerHTML = '<p style="color:var(--muted); font-size:15px; line-height:1.5; margin:0 0 16px;">No resets yet. When you reset this counter, the value it reached is saved here with a timestamp.</p>';
    }else{
      listEl.innerHTML = c.history.slice().reverse().map(function(h){
        return '<div class="log-row"><div class="log-val">Reached '+h.previousCount+'</div><div class="log-date">'+fmtDate(h.at)+'</div></div>';
      }).join('');
    }
    document.getElementById('histBackdrop').classList.add('open');
  }
  function closeHist(){ document.getElementById('histBackdrop').classList.remove('open'); historyId=null; }

  // ---- Wire up events ----
  document.getElementById('addBtn').addEventListener('click', function(){ openForm(null); });
  document.getElementById('saveBtn').addEventListener('click', saveForm);
  document.getElementById('cancelBtn').addEventListener('click', closeForm);
  document.getElementById('deleteBtn').addEventListener('click', deleteCurrent);
  document.getElementById('histClose').addEventListener('click', closeHist);

  document.getElementById('formBackdrop').addEventListener('click', function(e){ if(e.target===this) closeForm(); });
  document.getElementById('histBackdrop').addEventListener('click', function(e){ if(e.target===this) closeHist(); });

  document.getElementById('list').addEventListener('click', function(e){
    var btn = e.target.closest('button[data-act]'); if(!btn) return;
    var id = btn.getAttribute('data-id'), act = btn.getAttribute('data-act');
    if(act==='inc') inc(id);
    else if(act==='dec') dec(id);
    else if(act==='reset') reset(id);
    else if(act==='edit') openForm(id);
    else if(act==='hist') openHist(id);
  });

  load();
  render();
})();
</script>
</body>
</html>
